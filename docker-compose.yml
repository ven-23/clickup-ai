services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=clickup_user
      - POSTGRES_PASSWORD=clickup_pass
      - POSTGRES_DB=clickup_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      - DB_URL=postgresql://clickup_user:clickup_pass@db:5432/clickup_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - SENTRY_DSN=${SENTRY_DSN}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0

  import:
    build: .
    depends_on:
      - db
    environment:
      - DB_URL=postgresql://clickup_user:clickup_pass@db:5432/clickup_db
      - CSV_FILE_1=/data/Mar-Jul2025.csv
      - CSV_FILE_2=/data/Sep-Jan.csv
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - .:/app
      - ${HOST_DATA_PATH}:/data
    command: python import_data.py

volumes:
  postgres_data:
